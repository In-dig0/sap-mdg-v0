# =============================================================================
# MDG - Migration Data Governance | docker-compose.yml
# Versione: v0 (sviluppo locale WSL2)
# Servizi: PostgreSQL · PgAdmin · SFTP (atmoz) · Bruin · Streamlit
#
# NOTA WSL2: i volumi datalake sono named (non bind-mount su /mnt/d/)
# per evitare problemi di permessi NTFS. In produzione OCI tornare
# a bind-mount diretti.
#
# Uso:
#   docker compose down && docker compose up -d
#   docker cp <file.zip> mdg_sftp:/home/mdg_sftp/from_olderp/
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — database MDG
  # Schemi: raw (dati ERP), ref (tabelle controllo SAP), stg (staging + check), prd (dati pronti)
  # ---------------------------------------------------------------------------
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: mdg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data      
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # PgAdmin — interfaccia web per PostgreSQL
  # URL: http://localhost:8080
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mdg_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      TZ: ${TZ}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # SFTP (SFTPGo) — punto di ingresso file ZIP e XLSX
  #
  # Sostituisce atmoz/sftp con SFTPGo, più robusto per produzione.
  # Volumi datalake invariati — mappati come cartelle virtuali dell'utente mdg_sftp.
  #
  # WebAdmin (solo rete interna, non esposto all'esterno):
  #   http://localhost:${SFTPGO_ADMIN_PORT}   → gestione utenti, audit log, chiavi SSH
  #
  # Accesso SFTP client:
  #   sftp -P ${SFTP_PORT} mdg_sftp@localhost
  #
  # Primo avvio: creare l'utente mdg_sftp dal WebAdmin oppure tramite
  #   docker exec mdg_sftp sftpgo resetpwd --config-dir /var/lib/sftpgo
  # ---------------------------------------------------------------------------
  sftp:
    image: drakkan/sftpgo:latest
    container_name: mdg_sftp
    restart: unless-stopped
    # SFTPGo gira come root per gestire i permessi dei named volumes Docker
    # (creati con owner root). Il processo SFTP interno rimane sicuro perché
    # SFTPGo esegue il chroot per ogni utente indipendentemente dall'utente
    # di sistema con cui gira il demone.
    user: "0:0"
    ports:
      - "${SFTP_PORT}:2022"                        # SFTP — porta 22 esterna → 2022 interna SFTPGo
      - "${SFTPGO_ADMIN_PORT}:8080"                # WebAdmin porta 8082 esterna → 8080 interna
    volumes:
      # Dati persistenti SFTPGo (DB SQLite, log)
      - sftpgo_data:/var/lib/sftpgo
      # Host keys SSH
      - ${SFTP_KEY_PATH}/ssh_host_ed25519_key:/var/lib/sftpgo/.ssh/ssh_host_ed25519_key:ro
      - ${SFTP_KEY_PATH}/ssh_host_rsa_key:/var/lib/sftpgo/.ssh/ssh_host_rsa_key:ro
      # Datalake — stessi named volumes di prima
      - datalake_pprod:/datalake/in_source_pprod
      - datalake_sap:/datalake/in_source_sap
      - datalake_others:/datalake/in_source_others
      - datalake_out:/datalake/out_source_mdg
    environment:
      SFTPGO_HTTPD__BINDINGS__0__PORT: 8080
      SFTPGO_SFTPD__BINDINGS__0__PORT: 2022
      SFTPGO_DATA_PROVIDER__DRIVER: sqlite
      SFTPGO_DATA_PROVIDER__NAME: /var/lib/sftpgo/sftpgo.db
      # Crea l'admin al primo avvio se non esiste ancora nel DB.
      # Ai riavvii successivi questa impostazione non ha effetto.
      SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN: "true"
      SFTPGO_SFTPD__HOST_KEYS: /var/lib/sftpgo/.ssh/ssh_host_ed25519_key,/var/lib/sftpgo/.ssh/ssh_host_rsa_key
      SFTPGO_DEFAULT_ADMIN_USERNAME: ${SFTPGO_ADMIN_USER}
      SFTPGO_DEFAULT_ADMIN_PASSWORD: ${SFTPGO_ADMIN_PASSWORD}
      TZ: ${TZ}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # Bruin — orchestratore pipeline (ingestion + quality checks)
  #
  # Il container resta in piedi con "sleep infinity" in attesa di
  # docker exec da FastAPI. La pipeline viene avviata on-demand.
  # Run manuale:
  #   docker exec -it mdg_bruin bruin run /project/bruin
  # ---------------------------------------------------------------------------
  bruin:
    build:
      context: ./bruin
      dockerfile: Dockerfile
    container_name: mdg_bruin
    restart: unless-stopped
    entrypoint: ["sleep", "infinity"]
    working_dir: /project/bruin
    environment:
      POSTGRES_HOST:     ${POSTGRES_HOST}
      POSTGRES_PORT:     ${POSTGRES_PORT}
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ:                ${TZ}
    volumes:
      - .:/project                              # tutta la cartella progetto
      - datalake_pprod:/project/datalake/in_source_pprod:ro
      - datalake_sap:/project/datalake/in_source_sap:ro
      - datalake_others:/project/datalake/in_source_others:ro
      - datalake_out:/project/datalake/out_source_mdg      
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # Streamlit — dashboard qualità dati MDG
  # URL: http://localhost:8501
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: mdg_streamlit
    restart: unless-stopped
    ports:
      - "${STREAMLIT_PORT}:8501"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./streamlit/app:/app
      - ./bruin/config:/app/config
      - ./logs:/app/logs         
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # FastAPI — Pipeline Controller
  # URL: http://localhost:8000
  # Docs Swagger: http://localhost:8000/docs
  # Docs ReDoc:   http://localhost:8000/redoc
  # ---------------------------------------------------------------------------
  fastapi:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mdg_fastapi
    restart: unless-stopped
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    environment:
      BRUIN_CONTAINER:   mdg_bruin
      BRUIN_PIPELINE:    /project/bruin
      SEMAPHORE_PATH:    /data/inbound/DATASET_READY.txt
      SAP_PATH:          /data/in_source_sap 
      OTHERS_PATH:       /data/in_source_others       
      LOG_DIR:           /logs
      POSTGRES_HOST:     ${POSTGRES_HOST}
      POSTGRES_PORT:     ${POSTGRES_PORT}
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ:                ${TZ}
    volumes:
      # Socket Docker — permette a FastAPI di fare 'docker exec mdg_bruin ...'
      - /var/run/docker.sock:/var/run/docker.sock
      # Volume datalake ERP — per leggere/creare il file semaforo DATASET_READY.txt
      - datalake_pprod:/data/inbound
      - datalake_sap:/data/in_source_sap
      - datalake_others:/data/in_source_others       
      # Log persistenti dei run
      - api_logs:/logs
      - ./api:/app
       
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # FastAPI + JWT Authentication Controller
  # URL: http://localhost:8001
  # ---------------------------------------------------------------------------
  mdg_auth:
    build:
      context: ./auth/api
      dockerfile: Dockerfile
    container_name: mdg_auth
    restart: unless-stopped
    environment:
      POSTGRES_HOST:        postgres
      POSTGRES_PORT:        5432
      POSTGRES_DB:          ${POSTGRES_DB}
      POSTGRES_USER:        ${POSTGRES_USER}
      POSTGRES_PASSWORD:    ${POSTGRES_PASSWORD}
      JWT_SECRET:           ${JWT_SECRET}
      JWT_LIFETIME_SECONDS: 28800        # 8 ore
      ADMIN_EMAIL:          ${ADMIN_EMAIL}       
      ADMIN_PASSWORD:       ${ADMIN_PASSWORD}    
      ADMIN_NAME:           ${ADMIN_NAME}              
    networks:
      - mdg_network
    depends_on:
      - postgres
    ports:
      - "8001:8001"    # solo sviluppo — rimuovi in produzione OCI

# =============================================================================
# Volumi
# =============================================================================
volumes:
  postgres_data:
    name: mdg_postgres_data
  pgadmin_data:
    name: mdg_pgadmin_data
  sftpgo_data:
    name: mdg_sftpgo_data
  datalake_pprod:
    name: mdg_datalake_pprod
  datalake_sap:
    name: mdg_datalake_sap
  datalake_others:
    name: mdg_datalake_others
  datalake_out:
    name: mdg_datalake_out      
  api_logs:
    name: mdg_api_logs
  

# =============================================================================
# Rete interna
# =============================================================================
networks:
  mdg_network:
    name: mdg_network
    driver: bridge
