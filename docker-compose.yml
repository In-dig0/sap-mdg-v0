# =============================================================================
# MDG - Migration Data Governance | docker-compose.yml
# Versione: v0 (sviluppo locale WSL2)
# Servizi: PostgreSQL · PgAdmin · SFTP (atmoz) · Bruin · Streamlit
#
# NOTA WSL2: i volumi datalake sono named (non bind-mount su /mnt/d/)
# per evitare problemi di permessi NTFS. In produzione OCI tornare
# a bind-mount diretti.
#
# Uso:
#   docker compose down && docker compose up -d
#   docker cp <file.zip> mdg_sftp:/home/mdg_sftp/from_olderp/
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — database MDG
  # Schemi: raw (dati ERP), ref (tabelle controllo SAP), stg (staging + check)
  # ---------------------------------------------------------------------------
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: mdg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # PgAdmin — interfaccia web per PostgreSQL
  # URL: http://localhost:8080
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mdg_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      TZ: ${TZ}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # SFTP (atmoz/sftp) — punto di ingresso file ZIP e XLSX
  #
  # Volumi named (workaround WSL2/NTFS):
  #   datalake_olderp → ZIP/CSV dall'ERP
  #   datalake_sap    → XLSX tabelle controllo SAP
  #
  # Deposito file:
  #   docker cp <file.zip> mdg_sftp:/home/mdg_sftp/from_olderp/
  #   oppure via client SFTP: sftp -P 22 mdg_sftp@localhost
  # ---------------------------------------------------------------------------
  sftp:
    image: atmoz/sftp:alpine
    container_name: mdg_sftp
    restart: unless-stopped
    ports:
      - "${SFTP_PORT}:22"
    volumes:
      - datalake_olderp:/home/mdg_sftp/from_olderp
      - datalake_sap:/home/mdg_sftp/from_sap
      - ./sftp/ssh_host_ed25519_key:/etc/ssh/ssh_host_ed25519_key:ro
      - ./sftp/ssh_host_rsa_key:/etc/ssh/ssh_host_rsa_key:ro
    command: ${SFTP_USERS}
    environment:
      TZ: ${TZ}
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # Bruin — orchestratore pipeline (ingestion + quality checks)
  #
  # Run manuale:
  #   docker exec -it mdg_bruin bruin run /pipelines/assets/ingestion
  # ---------------------------------------------------------------------------
  bruin:
    build:
      context: ./bruin
      dockerfile: Dockerfile
    container_name: mdg_bruin
    restart: "no"
    environment:
      BRUIN_POSTGRES_HOST: ${POSTGRES_HOST}
      BRUIN_POSTGRES_PORT: ${POSTGRES_PORT}
      BRUIN_POSTGRES_DB: ${POSTGRES_DB}
      BRUIN_POSTGRES_USER: ${POSTGRES_USER}
      BRUIN_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./bruin/assets:/pipelines/assets
      - ./bruin/pipeline.yml:/pipelines/pipeline.yml:ro
      - datalake_olderp:/data/inbound/from_olderp:ro
      - datalake_sap:/data/inbound/from_sap:ro
      - bruin_workspace:/data/workspace
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mdg_network

  # ---------------------------------------------------------------------------
  # Streamlit — dashboard qualità dati MDG
  # URL: http://localhost:8501
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: mdg_streamlit
    restart: unless-stopped
    ports:
      - "${STREAMLIT_PORT}:8501"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./streamlit/app:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mdg_network

# =============================================================================
# Volumi
# =============================================================================
volumes:
  postgres_data:
    name: mdg_postgres_data
  pgadmin_data:
    name: mdg_pgadmin_data
  bruin_workspace:
    name: mdg_bruin_workspace
  datalake_olderp:
    name: mdg_datalake_olderp
  datalake_sap:
    name: mdg_datalake_sap

# =============================================================================
# Rete interna
# =============================================================================
networks:
  mdg_network:
    name: mdg_network
    driver: bridge
